<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128">
      <stop offset="0%" stop-color="#061420"/>
      <stop offset="100%" stop-color="#050a14"/>
    </linearGradient>
    <linearGradient id="face" x1="48" y1="36" x2="80" y2="96">
      <stop offset="0%" stop-color="#a8e6ff"/>
      <stop offset="100%" stop-color="#2f8fff"/>
    </linearGradient>
    <radialGradient id="eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="60%" stop-color="#6eb6ff"/>
      <stop offset="100%" stop-color="#1460c8"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bg)"/>
  <circle cx="64" cy="64" r="52" stroke="#6eb6ff" stroke-width="2" opacity="0.35"/>
  <!-- hex shield frame -->
  <path d="M64 18 L96 36 V68 L64 110 L32 68 V36 Z" stroke="#2f8fff" stroke-width="1.5" opacity="0.4"/>
  <!-- hair -->
  <path d="M40 62c2-24 14-36 24-36s22 12 24 36c-4-10-12-16-24-16s-20 6-24 16z" fill="#8eb4d8"/>
  <!-- face -->
  <ellipse cx="64" cy="70" rx="22" ry="26" fill="url(#face)" opacity="0.9"/>
  <!-- cyber eye -->
  <circle cx="54" cy="68" r="5" fill="url(#eye)"/>
  <circle cx="74" cy="68" r="3.5" fill="#050a14"/>
  <circle cx="75" cy="67" r="1.2" fill="#6eb6ff"/>
  <!-- data marks -->
  <path d="M48 82h28M52 88h20" stroke="#fff" stroke-width="1" opacity="0.45"/>
  <!-- collar -->
  <path d="M40 112c8-14 16-20 24-20s16 6 24 20" fill="#0a1524" stroke="#6eb6ff" stroke-width="1.5"/>
  <text x="64" y="122" text-anchor="middle" fill="#6eb6ff" font-family="monospace" font-size="7" letter-spacing="1">SEC</text>
</svg>
