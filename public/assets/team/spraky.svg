  <path d="M36 70c0-18 12-30 28-30s28 12 28 30" stroke="#fff" stroke-width="2.5" fill="none"/>
  <rect x="30" y="68" width="10" height="14" rx="3" fill="#2f8fff" stroke="#fff" stroke-width="1"/>
  <rect x="88" y="68" width="10" height="14" rx="3" fill="#2f8fff" stroke="#fff" stroke-width="1"/>
