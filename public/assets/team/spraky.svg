<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="128" x2="128" y2="0">
      <stop offset="0%" stop-color="#061018"/>
      <stop offset="100%" stop-color="#0c2038"/>
    </linearGradient>
    <linearGradient id="face" x1="40" y1="40" x2="90" y2="95">
      <stop offset="0%" stop-color="#8eb4d8"/>
      <stop offset="100%" stop-color="#2f8fff"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" fill="url(#bg)"/>
  <circle cx="64" cy="64" r="52" stroke="#6eb6ff" stroke-width="2" opacity="0.3"/>
  <!-- hair spikes -->
  <path d="M36 56 L42 28 L52 50 L64 22 L76 50 L86 28 L92 56 Z" fill="#fff" opacity="0.9"/>
  <path d="M40 58c4-18 14-28 24-28s20 10 24 28" fill="#6eb6ff"/>
