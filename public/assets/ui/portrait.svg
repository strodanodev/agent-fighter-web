<svg xmlns="http://www.w3.org/2000/svg" width="92" height="92" viewBox="0 0 92 92">
  <!-- Portrait frame. The portrait image is drawn UNDER this frame in the
       window rect (7,7 78x78) — keep in sync with HUD_GEO.portraitWindow. -->
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8aec0"/>
      <stop offset="0.25" stop-color="#767c8e"/>
      <stop offset="0.6" stop-color="#4a4f5e"/>
      <stop offset="1" stop-color="#22242e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7e0a3"/>
      <stop offset="0.45" stop-color="#d9a441"/>
      <stop offset="1" stop-color="#8a5f1e"/>
    </linearGradient>
  </defs>
  <!-- outer dark + steel + gold inner line; center window stays transparent -->
  <path d="M4 0 H88 L92 4 V88 L88 92 H4 L0 88 V4 Z M7 7 V85 H85 V7 Z" fill="#101116" fill-rule="evenodd"/>
  <path d="M5.5 1.5 H86.5 L90.5 5.5 V86.5 L86.5 90.5 H5.5 L1.5 86.5 V5.5 Z M7 7 V85 H85 V7 Z" fill="url(#steel)" fill-rule="evenodd"/>
  <rect x="6" y="6" width="80" height="80" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- corner studs -->
  <polygon points="4,0 12,0 0,12 0,4" fill="url(#gold)"/>
  <polygon points="80,0 88,0 92,4 92,12" fill="url(#gold)"/>
  <polygon points="0,80 0,88 4,92 12,92" fill="url(#gold)"/>
  <polygon points="92,80 92,88 88,92 80,92" fill="url(#gold)"/>
</svg>
